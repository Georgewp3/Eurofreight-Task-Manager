{% extends "base.html" %}
{% block content %}
<section class="choice-wrap">
  <div class="choice-card login-card">
    <p class="choice-eyebrow">Eurofreight</p>
    <h1>Eurofreight Login</h1>
    <p class="choice-subtitle">Select your name and enter your password.</p>

    <form class="login-form" method="post" action="{{ url_for('eurofreight_login_post') }}">
      <div class="field">
        <label for="user_id">User</label>
        <div class="select-wrap">
          <select id="user_id" name="user_id" required>
            <option value="">choose user</option>
            {% for u in users %}
            <option value="{{ u.id }}">{{ u.full_name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" inputmode="numeric" autocomplete="current-password" required>
      </div>

      <div class="login-actions">
        <button class="primary large" type="submit">Login</button>
        <a class="button ghost-link" href="{{ url_for('choice_page') }}">Back to company selection</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
