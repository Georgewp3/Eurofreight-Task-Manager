{% extends "base.html" %}
{% block content %}
<section class="choice-wrap">
  <div class="choice-card">
    <p class="choice-eyebrow">Task Manager</p>
    <h1>Welcome</h1>
    <p class="choice-subtitle">Please choose your company to continue.</p>

    <div class="choice-actions">
      <a class="choice-btn logo-btn" href="{{ url_for('user_page') }}" aria-label="EUROFREIGHT">
        <img src="{{ url_for('static', filename='eurofreight-logo.svg') }}" alt="EUROFREIGHT">
      </a>
      <a class="choice-btn logo-btn secondary" href="{{ url_for('ikea_page') }}" aria-label="IKEA">
        <img src="{{ url_for('static', filename='ikea-logo.svg') }}" alt="IKEA">
      </a>
    </div>
  </div>
</section>
{% endblock %}
